[build]
  command = "npm install && node scripts/build-web-root.mjs"
  publish = "apps/web-root"

[functions]
  directory = "netlify/functions"

# Security headers applied to all routes
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent browsers from MIME-sniffing away from the declared content type
    X-Content-Type-Options = "nosniff"

    # Prevent this app from being embedded in iframes on other origins
    X-Frame-Options = "SAMEORIGIN"

    # Stop legacy browsers sending the full Referer URL to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict browser features not used by this app
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

    # Content Security Policy
    # - script-src: 'unsafe-inline' is required — the HTML files contain author-written
    #   inline scripts for share-token pre-loading and UA routing. These are static, not
    #   user data. The XSS risk CSP script-src would normally guard against is separately
    #   addressed by the renderColumns() DOM-API refactor (Finding 1).
    # - connect-src: self + Supabase project + Plausible + Cloudflare + Netlify RUM endpoints
    # - img-src: self, data URIs, blob URLs (photo previews), and Supabase storage
    # - style-src: 'unsafe-inline' required by existing extensive inline styles
    # - font-src: self (fonts are self-hosted)
    # - frame-src: Netlify CDP iframe (auto-injected by Netlify)
    # - frame-ancestors 'none': prevents clickjacking from any origin
    # - form-action 'self': prevents form submissions to external sites
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://plausible.io https://static.cloudflareinsights.com; connect-src 'self' https://*.supabase.co https://plausible.io https://cloudflareinsights.com https://*.nsvcs.net; img-src 'self' data: blob: https://*.supabase.co; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-src https://app.netlify.com; frame-ancestors 'none'; form-action 'self';"

# Long-lived cache for fonts (immutable — versioned via deploy)
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-lived cache for static images
[[headers]]
  for = "/*/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

